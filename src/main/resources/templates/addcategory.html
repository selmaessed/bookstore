<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Category</title>
</head>

<body>
    <h1>Add New Category</h1>
    <form th:action="@{/savecategory}" th:object="${category}" method="post">
        <label>Name:</label>
        <input type="text" th:field="*{name}" />
        <button type="submit">Save</button>
    </form>
</body>

</html>
