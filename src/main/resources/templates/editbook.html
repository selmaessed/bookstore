<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Book</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="container">
        <h1>Edit Book</h1>

        <form th:action="@{/books/edit/{id}(id=${book.id})}" th:object="${book}" method="post">

            <input type="hidden" th:field="*{id}">

            <label>Title:</label>
            <input type="text" th:field="*{title}" required>

            <label>Author:</label>
            <input type="text" th:field="*{author}" required>

            <label>Year:</label>
            <input type="number" th:field="*{publicationYear}" required>

            <label>Category:</label>
            <select th:field="*{category.id}" required>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>

            <input type="submit" value="Update Book">
        </form>

        <div class="text-center back-btn">
            <a href="/books" class="btn btn-secondary">Back to Books</a>
        </div>
    </div>
</body>

</html>
