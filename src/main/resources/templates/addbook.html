<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Book</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="container">
        <h1>Add New Book</h1>

        <form th:action="@{/books}" th:object="${book}" method="post">

            <label>Title</label>
            <input type="text" th:field="*{title}" required />

            <label>Author</label>
            <input type="text" th:field="*{author}" required />

            <label>Publication Year</label>
            <input type="number" th:field="*{publicationYear}" required />

            <label>Category</label>
            <select th:field="*{category.id}" required>
                <option value="">Select category</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>

            <button type="submit">Save Book</button>
        </form>



        <div class="text-center back-btn">
            <a href="/books" class="btn btn-secondary">Back to Books</a>
        </div>
    </div>
</body>

</html>
